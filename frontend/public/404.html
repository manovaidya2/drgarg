<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Dr. Ankush Garg</title>
    <meta name="description" content="The page you are looking for cannot be found." />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f5f8;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        width: min(520px, 90vw);
      }
      .title {
        font-size: 5rem;
        margin: 0;
        color: #8b43ba;
      }
      .subtitle {
        font-size: 1.75rem;
        margin: 1rem 0 0.5rem;
      }
      .text {
        color: #555;
        margin: 0.75rem auto 1.75rem;
        max-width: 36rem;
      }
      .button {
        display: inline-block;
        padding: 0.95rem 1.75rem;
        color: #fff;
        background: #8b43ba;
        border-radius: 999px;
        text-decoration: none;
        transition: background 0.2s ease;
      }
      .button:hover {
        background: #7335a0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">404</h1>
      <h2 class="subtitle">Page Not Found</h2>
      <p class="text">Sorry, the page you are looking for does not exist or has been moved.</p>
      <a class="button" href="/">Go Back Home</a>
    </div>
  </body>
</html>
